<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Prism</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="calc-wrapper" role="application" aria-label="Calculator">

        <header class="calc-header">
            <button class="header-btn" id="historyToggle" aria-label="Open calculation history"
                title="Calculation History">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path
                        d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.53.85-1.07-3.63-2.16V8h-1.5z" />
                </svg>
            </button>

            <span class="brand-name">Prism</span>

            <div style="display: flex; gap: 8px;">
                <button class="header-btn sound-toggle" id="soundToggle" aria-label="Toggle button click sound"
                    title="Sound Settings">
                    <svg class="sound-on-icon" viewBox="0 0 24 24">
                        <path
                            d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />
                    </svg>
                    <svg class="sound-off-icon" viewBox="0 0 24 24">
                        <path
                            d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z" />
                    </svg>
                </button>

                <button class="header-btn theme-toggle" id="themeToggle" aria-label="Toggle theme color"
                    title="Theme Settings">
                    <svg class="moon-icon" viewBox="0 0 24 24">
                        <path
                            d="M12.3 22h-.1c-5.5 0-10-4.5-10-10C2.2 6.8 6.4 2.4 11.7 2c.3 0 .6.2.7.5.1.3 0 .6-.2.8-2.2 2.3-2.5 5.9-.6 8.5 2.2 2.9 6.2 3.8 9.4 2.1.3-.1.6 0 .8.2.2.3.2.6 0 .8-2.3 4.4-6.9 7.1-11.5 7.1z" />
                    </svg>
                    <svg class="sun-icon" viewBox="0 0 24 24">
                        <path
                            d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.01c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z" />
                    </svg>
                </button>
            </div>
        </header>

        <section class="calc-display">
            <div class="status-indicators">
                <span class="indicator-badge" id="memoryIndicator" aria-label="Memory active">M</span>
            </div>

            <div class="display-history" id="displayHistory" aria-live="polite" aria-atomic="true"></div>
            <div class="display-expression" id="displayExpression" aria-live="polite" aria-atomic="true" tabindex="0">0
            </div>
            <div class="display-preview" id="displayPreview" aria-live="polite" aria-atomic="true"></div>
        </section>

        <section class="history-drawer" id="historyDrawer" aria-label="Calculation history panel" aria-hidden="true">
            <div class="history-drawer-header">
                <h2 class="history-drawer-title">History</h2>
                <button class="header-btn" id="clearHistory" aria-label="Clear history entries"
                    title="Clear All History">
                    <svg viewBox="0 0 24 24">
                        <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z" />
                    </svg>
                </button>
            </div>
            <div class="history-list" id="historyList"></div>
        </section>
        <div class="drawer-overlay" id="drawerOverlay" aria-hidden="true"></div>

        <section class="calc-keypad">
            <div class="memory-row" role="group" aria-label="Memory and Percentage keys">
                <button class="memory-btn" id="key-mc" data-action="mc" aria-label="Memory clear">MC</button>
                <button class="memory-btn" id="key-mr" data-action="mr" aria-label="Memory recall">MR</button>
                <button class="memory-btn" id="key-mplus" data-action="m+" aria-label="Memory add">M+</button>
                <button class="memory-btn" id="key-mminus" data-action="m-" aria-label="Memory subtract">M-</button>
                <button class="memory-btn" id="key-mod" data-char="%" aria-label="modulus percentage">%</button>
            </div>

            <div class="keys-grid" role="group" aria-label="Standard Keypad">
                <button class="key special" data-action="clear" aria-label="clear all">AC</button>
                <button class="key special" data-action="backspace" aria-label="backspace deletion">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
                        <path
                            d="M22 3H7c-.69 0-1.23.35-1.59.88L0 12l5.41 8.11c.36.53.9.89 1.59.89h15c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-3 12.59L17.59 17 14 13.41 10.41 17 9 15.59 12.59 12 9 8.41 10.41 7 14 10.59 17.59 7 19 8.41 15.41 12 19 15.59z" />
                    </svg>
                </button>
                <button class="key special" data-action="parentheses" aria-label="parentheses">( )</button>
                <button class="key operator" data-char="÷" aria-label="divide">÷</button>

                <button class="key number" data-char="7" aria-label="seven">7</button>
                <button class="key number" data-char="8" aria-label="eight">8</button>
                <button class="key number" data-char="9" aria-label="nine">9</button>
                <button class="key operator" data-char="×" aria-label="multiply">×</button>

                <button class="key number" data-char="4" aria-label="four">4</button>
                <button class="key number" data-char="5" aria-label="five">5</button>
                <button class="key number" data-char="6" aria-label="six">6</button>
                <button class="key operator" data-char="-" aria-label="subtract">−</button>

                <button class="key number" data-char="1" aria-label="one">1</button>
                <button class="key number" data-char="2" aria-label="two">2</button>
                <button class="key number" data-char="3" aria-label="three">3</button>
                <button class="key operator" data-char="+" aria-label="add">+</button>

                <button class="key special" data-action="negate" aria-label="positive negative toggle">±</button>
                <button class="key number" data-char="0" aria-label="zero">0</button>
                <button class="key number" data-char="." aria-label="decimal point">.</button>
                <button class="key equals" data-action="calculate" aria-label="equals calculate">=</button>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
